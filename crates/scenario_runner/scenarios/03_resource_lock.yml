name: "Resource Lock Collision Test"
timeout_sec: 60
panes:
  - id: "agent_a"
    name: "Refactor_Agent"
  - id: "agent_b"
    name: "Logger_Agent"
steps:
  - action: "prompt"
    pane: "agent_a"
    prompt: "LOCK TASK: 1. Acquire a lock on 'shared.rs' using `acquire_lock`. 2. Write '// REFACTOR' to 'shared.rs' using `sys_shell_exec`. 3. DO NOT RELEASE the lock yet."
  
  - action: "wait_for_status"
    pane: "agent_a"
    status: "Locking"
    timeout_sec: 30

  - action: "prompt"
    pane: "agent_b"
    prompt: "COLLISION TASK: Try to write '// LOG' to 'shared.rs' using `sys_shell_exec`. If it fails with a 'LOCKED' message, you MUST immediately write 'LOCKED_BY_PEER' to 'collision.log' using `sys_shell_exec`. DO NOT ASK FOR PERMISSION."

  - action: "wait_for_status"
    pane: "agent_b"
    status: "Active"
    timeout_sec: 30

assertions:
  - type: "file_contains"
    path: "collision.log"
    content: "LOCKED_BY_PEER"
