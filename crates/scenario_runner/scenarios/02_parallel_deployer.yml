name: "Parallel Deployer Test"
timeout_sec: 120
panes:
  - id: "leader"
    name: "Leader"
  - id: "worker_fe"
    name: "FE_Worker"
  - id: "worker_be"
    name: "BE_Worker"
steps:
  - action: "prompt"
    pane: "leader"
    prompt: "ORCHESTRATION TASK: 1. Use `delegate_task_async` to send 'echo FE_DONE > fe.txt' to FE_Worker. 2. Use `delegate_task_async` to send 'echo BE_DONE > be.txt' to BE_Worker. 3. Immediately use `await_tasks` with both IDs. 4. After wakeup, use `sys_shell_exec` to write 'DEPLOY_SUCCESS' to 'final.log'. DO NOT DO ANYTHING ELSE."
  
  - action: "wait_for_status"
    pane: "leader"
    status: "Suspended"
    timeout_sec: 40

  - action: "wait_for_tool_call"
    pane: "leader"
    tool_name: "sys_shell_exec"
    timeout_sec: 60

assertions:
  - type: "file_contains"
    path: "final.log"
    content: "DEPLOY_SUCCESS"
  - type: "file_contains"
    path: "fe.txt"
    content: "FE_DONE"
  - type: "file_contains"
    path: "be.txt"
    content: "BE_DONE"
