name: "Log Watchdog Test"
timeout_sec: 60
panes:
  - id: "server"
    name: "Target Server"
  - id: "watcher"
    name: "Watchdog Agent"
steps:
  - action: "prompt"
    pane: "watcher"
    prompt: "Subscribe to 'Target Server' for the regex `ERROR`. If it matches, use sys_shell_exec to write 'DETECTION_SUCCESS' to 'test_result.txt'. Until then, go to sleep."
  
  - action: "wait_for_status"
    pane: "watcher"
    status: "Suspended"
    timeout_sec: 15

  - action: "inject_terminal_output"
    pane: "server"
    output: "Starting service...\n[ERROR] Database connection failed.\n"

  - action: "wait_for_status"
    pane: "watcher"
    status: "Active"
    timeout_sec: 15

assertions:
  - type: "file_contains"
    path: "test_result.txt"
    content: "DETECTION_SUCCESS"
