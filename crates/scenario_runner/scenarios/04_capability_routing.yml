name: "Capability Routing Test"
timeout_sec: 60
panes:
  - id: "rust_expert"
    name: "Rust_Pane"
  - id: "css_expert"
    name: "CSS_Pane"
  - id: "leader"
    name: "Leader"
steps:
  - action: "prompt"
    pane: "rust_expert"
    prompt: "ROLE: You are the RUST EXPERT. 1. Use `sys_shell_exec` to create 'expert_ready' file. 2. When you receive a delegated task, you MUST execute it immediately using tools."
  
  - action: "prompt"
    pane: "leader"
    prompt: "ROUTING TASK: Use `request_assistance` for capability 'rust'. The prompt for the assistant is: 'Use sys_shell_exec to write RUST_ROUTED_OK to routing.log'. You MUST wait for the assistant to finish."

  - action: "wait_for_status"
    pane: "leader"
    status: "Active"
    timeout_sec: 45

assertions:
  - type: "file_contains"
    path: "routing.log"
    content: "RUST_ROUTED_OK"
