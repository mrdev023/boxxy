name: "TUI Automation Test"
timeout_sec: 60
panes:
  - id: "tui_pane"
    name: "TUI_Target"
  - id: "automator"
    name: "Automator"
steps:
  - action: "prompt"
    pane: "tui_pane"
    prompt: "Start a long-running process that reads from stdin and writes to 'output.txt'. You can use `cat > output.txt`. Do not finish the command, just start it."
  
  - action: "wait_for_status"
    pane: "tui_pane"
    status: "Active"
    timeout_sec: 20

  - action: "prompt"
    pane: "automator"
    prompt: "The agent 'TUI_Target' is waiting for input. Use `send_keystrokes_to_pane` to send the string 'VIRTUAL_KEYBOARD_WORKS' followed by a newline (\\n) and then Ctrl+D (\\x04) to close the stream."

  - action: "wait_for_status"
    pane: "automator"
    status: "Active"
    timeout_sec: 30

assertions:
  - type: "file_contains"
    path: "output.txt"
    content: "VIRTUAL_KEYBOARD_WORKS"
